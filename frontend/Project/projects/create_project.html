<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=4, initial-scale=1.0">
  <title>프로젝트</title>
  <link rel="stylesheet" href="../projectList.css">
  <link rel="stylesheet" href="./css/createProjecct.css">
</head>
<body>
  <header class="profile-header">
    <img src="./free-icon-user-159833.png" alt="유저 아이콘" class="user-icon">
    <div class="profile-info">
      <strong>nickname</strong> (user_name)
    </div>
  </header>

  <main>
    <div class="tag">
      <h1>Project</h1>
      <button class="btn-project" id="create projects" aria-label="프로젝트 생성 버튼">Project 생성</button>
    
    <ul class="project-list">
      <li class="project-item">
        <div class="project-info">
          <a href="./project1.html" class="projectside-name">project name 1</a>
        </div>
        <div class="project-actions">
          <button class="del">del</button>
        </div>
      </li>
      <li class="project-item">
        <div class="project-info">
          <a href="#" class="projectside-name">project name 2</a>
        </div>
        <div class="project-actions">
          <button class="del">del</button>
        </div>
      </li>
      <li class="project-item">
        <div class="project-info">
          <a href="#" class="projectside-name">project name 3</a>
        </div>
        <div class="project-actions">
          <button class="del">del</button>
        </div>
      </li>
    </ul>

    <div class="inner_body">
        <aside class="side_bar js-side_bar">
          <ul>
            <form id="contact-form" class="form">
              <label for="ProjectName">ProjectName</label>
              <input type="ProjectName" id="ProjectName" name="ProjectName" placeholder="ProjectName" required />
  
              <label for="message">Description</label>
              <textarea name="message" id="message" rows="4" placeholder="Required Description."></textarea>
  
              <button type="submit" class="btn primary">완료</button>
            </form>
          </ul>
          <button onclick="sideBar.close()">close</button>
        </aside>
      </div>
  </main>
</body>
</html>
