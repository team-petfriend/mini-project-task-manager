<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹앱 기본 레이아웃 구성</title>
  <style>
    :root {
  /* == 배경색 지정(Background) == */
  --bg: #0f172a;
  --bg-muted: #111827;
  --card: #111827;
  
  /* == 글자색 지정(Text) == */
  --text: #e5e7eb;
  --muted: #9ca3af;

  /* == 주요 & 강조 색상 지정(Primary & Accent Colors) == */
  --primary: #4f46e5;
  --primary-contrast: #ffffff;
  --accent: #22c55e;

  /* == 상태 색상 (Status Colors) == */
  --danger: #dc2626;

  /* 테두리 & 그림자 색상 (Borders & Shadows) */
  --outline: #374151;
  --shadow: 0 10px 25px rgba(0,0,0,0.3);

  /* 레이아웃 (Layouts) */
  --radius: 16px;
  --container: 1120px;
}

* {
  box-sizing: border-box;
}

html, body { height: 100%; }

body {
  margin: 0;
  color: var(--text);
  background:var(--bg)
}

/* 앱 전체 - 세로로 헤더/본문/푸터 */
.app{
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 헤더 (상단 바) */
.header{
  flex: 0 0 56px;                      /* 고정 높이 */
  display: flex; 
  align-items: center;
  padding: 0 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* 본문: 좌측 사이드바 | 우측 메인 (가로 배치) */
.body{
  flex: 1 1 auto;
  display: flex;                       /* 가로 */
  min-height: 0;                       /* 내부 스크롤 계산 정확히 */
  justify-content: center;
  
}

/* 사이드바 (좌) */
.sidebar{
  flex: 0 0 500px;                     /* 고정 폭 (사진 느낌) */
  padding: 16px;
  overflow: auto;
  background: linear-gradient(135deg, rgba(79,70,229,0.25), rgba(24,197,94,0.25));
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 10px;
}

.sidebar-list {
  list-style: none;
  height: 500px;
  display: flex;
  border-radius: 20px;
  align-items: center;
  justify-content: center;
}

.sidebar-list p {
  text-align: center;
}


/* 메인 (우) : 탭/요청/응답을 위→아래로 */
.main{
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  min-width: 0;                        /* 내용 넘침 방지 */
  border-left: 0;                       /* 외형 유지용 (선은 tabs/request에서 처리) */
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* 탭 바 (우측 상단) */
.tabs{
  flex: 0 0 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 8px;
  background: linear-gradient(135deg, rgba(79,70,229,0.25), rgba(24,197,94,0.25));
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 15px;
  margin-left: 5px;
  margin-top: 5px;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  
}

.search-box input {
  width: 1280px;
  padding: 8px 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
}

.search-box input:focus {
  outline: none;
  border-color: #4f46e5; /* 포커스 시 보라색 테두리 */
  box-shadow: 0 0 4px rgba(79, 70, 229, 0.3);
}

.search-box button {
  padding: 8px 12px;
  background-color: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  flex: 0 0 auto; 
  min-width: 80px;
  max-width: 200px; 
}

.search-box button:hover {
  background-color: #4338ca;
}

/* 요청/응답 영역을 세로로 분할 */
.request-panel {
  flex: 0 1 30%;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* 중앙 정렬 */
  overflow: hidden;        /* 스크롤 제거 */
  background: linear-gradient(135deg, rgba(79,70,229,0.25), rgba(24,197,94,0.25));
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 15px;
  margin-left: 5px;
}

.response-panel {
  flex: 1 1 auto;
  padding: 16px;
  overflow: hidden;        /* 스크롤 제거 */

  background: linear-gradient(135deg, rgba(79,70,229,0.25), rgba(24,197,94,0.25));
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 15px;
  margin-left: 5px;
  margin-top: 5px;
}

.img-wrapper {
  margin: 0 auto;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;      /* 화면 전체 높이 */
  overflow: hidden;   /* 넘치는 영역 숨김 */
  width: 100%;
}

.img-wrapper img {
  width: 100%;
  height: 100%;       /* 부모 높이에 맞춤 */
  object-fit: cover;  /* 비율 유지하면서 꽉 채움 */
  border-radius: 20px;
}

.img-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-weight: bold;
  text-align: center;
  width: 80%;
  text-shadow: 0 0 5px rgba(0,0,0,0.7);
}

.board {
  list-style: none;
  background: linear-gradient(135deg, rgba(79,70,229,0.25), rgba(24,197,94,0.25));
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 15px;
}



/* 하단 상태바 */
.footer{
  flex: 0 0 28px;
  display: flex; 
  align-items: center;
  padding: 0 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
  </style>
</head>
<body>
  <div class="app">
    <!-- 상단 헤더 -->
    <header class="header">헤더</header>

    <!-- 본문: 좌측 사이드바 + 우측 메인 -->
    <div class="body">
      <aside class="sidebar">
        <ul class="sidebar-list">
          <li>
            <img src="./img/info.png" alt="">
            <p>test1234</p>
          </li>
        </ul>
      </aside>

      <main class="main">
        

      <section class="request-panel">
        <div class="img-wrapper">
          <img src="./img/li-zhang-13AE9Hva4Wo-unsplash.jpg" alt="">
          <div class="img-text">
            <h3>프로젝트에 오신 것을 환영합니다</h3>
            <p>
              스프레드시트처럼 구성된 프로젝트 테이블은 이슈와 풀 리퀘스트를 실시간으로 필터링, 정렬, 그룹화할 수 있는 캔버스를 제공합니다.
              맞춤 필드와 저장된 뷰를 활용하여 필요에 맞게 자유롭게 구성하세요.
            </p>
          </div>
        </div>
      </section>

        <div class="tabs">
          <ul>
            <div class="search-box">
                <input type="text" placeholder="검색어를 입력하세요"/>
                <button>새로운 프로젝트</button>
            </div>
          </ul>
        </div>
        <section class="response-panel">
          <div>
            <ul class="board">
              <li class="first-column">
                <span>생성된 프로젝트</span>
              </li>
              <li class="column">
                <img src="" alt="">
                <span>PetFriendPrj</span>
                <span>#4 updated 1 hour ago</span>
              </li>
            </ul>
          </div>
        </section>
      </main>
    </div>

    <!-- 하단 상태바 -->
    <footer class="footer">하단 바</footer>
  </div>
</body>
</html>
