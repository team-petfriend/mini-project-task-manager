<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=4, initial-scale=1.0">
  <title>프로젝트</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/main.js"></script>
</head>

<body>
  <header class="profile-header">
    <img src="./free-icon-user-159833.png" alt="유저 아이콘" class="user-icon">
    <div class="profile-info">
      <strong>nickname</strong> (user_name)
    </div>
  </header>

  <main>
    <div class="tag">
      <h1>Project1</h1>
      <button onclick="sideBar.open()" class="btn-task" id="create Task" aria-label=" Task 생성 버튼">Task 생성</button>
      <div class="inner_body">
        <aside class="side_bar js-side_bar">
          <ul>
            <form id="contact-form" class="form">
              <label for="email">Title</label>
              <input type="email" id="email" name="email" placeholder="Required Title" required />
  
              <label for="message">Discription</label>
              <textarea name="message" id="message" rows="4" placeholder="Required Discription."></textarea>
  
              <button type="submit" class="btn primary">완료</button>
            </form>
          </ul>
          <button onclick="sideBar.close()">close</button>
        </aside>
      </div>
    </div>
  </main>
</body>
