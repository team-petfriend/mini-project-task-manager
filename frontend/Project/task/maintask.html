<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹앱 기본 레이아웃 구성</title>
    <link rel="stylesheet" href="./css/sidebar.css" />
    <link rel="stylesheet" href="./css/minitask.css" />
  </head>
  <body>
    <div class="app">
      <!-- 상단 헤더 -->
      <header class="header">
        <ul>
          <li class="header-left">
            <p>project</p>
            <p>/</p>
            <p>projects</p>
            <p>/</p>
            <p>task</p>
          </li>
          <li class="header-right">
            <img src="./img/user.png" alt="" />
          </li>
        </ul>
      </header>

      <!-- 본문: 좌측 사이드바 + 우측 메인 -->
      <div class="body">
        <aside class="sidebar">
          <nav class="nav">
            <div class="nav-brand">
              <ion-icon
                name="menu-outline"
                class="nav__toggle"
                id="nav-toggle"
              ></ion-icon>
            </div>
            <div class="nav-list">
              <a href="#" class="nav_link">
                <ion-icon name="home-outline" class="nav__icon"></ion-icon>
                <span class="nav-name">Menu1</span>
              </a>
              <div href="#" class="nav_link collapse">
                <ion-icon name="folder-outline" class="nav__icon"></ion-icon>
                <span class="nav-name">Projects</span>
              </div>
              <div href="#" class="nav_link collapse">
                <ion-icon name="folder-outline" class="nav__icon"></ion-icon>
                <span class="nav-name">Task</span>
              </div>
            </div>
          </nav>
        </aside>

        <main class="main">
          <div class="tabs">
            <ul>
              <li>
                <div class="search-box">
                  <input type="text" placeholder="검색어를 입력하세요" />
                  <button>검색</button>
                </div>
              </li>
            </ul>
          </div>

          <section class="request-panel">
            <ul class="board">
              <li class="column">
                <div class="column-title">
                  <img src="./img/todoCheck.png" alt="" />
                  <h3>ToDo</h3>
                  <p class="count">1</p>
                </div>
                <ul class="task-list">
                  <li class="task">
                    <div class="task-inner">
                      <img src="./img/todo.png" alt="" />
                      <span>petFriend#1</span>
                    </div>
                    <a href="">프론트엔드 구현 완료</a>
                  </li>
                </ul>
              </li>

              <li class="column">
                <div class="column-title">
                  <img src="./img/inprogresscheck.png" alt="" />
                  <h3>InProgress</h3>
                  <p class="count">1</p>
                </div>
                <ul class="task-list">
                  <li class="task">
                    <div class="task-inner">
                      <img src="./img/inprogress.png" alt="" />
                      <span>petFriend#1</span>
                    </div>
                    <a href="">프론트엔드 구현 완료</a>
                  </li>
                </ul>
              </li>

              <li class="column">
                <div class="column-title">
                  <img src="./img/donecheck.png" alt="" />
                  <h3>Done</h3>
                  <p class="count">1</p>
                </div>
                <ul class="task-list">
                  <li class="task">
                    <div class="task-inner">
                      <img src="./img/done.png" alt="" />
                      <span>petFriend#1</span>
                    </div>
                    <a href="">프론트엔드 구현 완료</a>
                  </li>
                </ul>
              </li>
            </ul>
          </section>
        </main>
      </div>
    </div>
    <script src="https://unpkg.com/ionicons@5.2.3/dist/ionicons.js"></script>
  </body>
</html>
