<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=4, initial-scale=1.0">
  <title>task1.html</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header class="profile-header">
    <img src="./free-icon-user-159833.png" alt="유저 아이콘" class="user-icon">
    <div class="profile-info">
      <strong>nickname</strong> (user_name)
    </div>
  </header>

  <main class="task-detail-container">
    <div class="task-card">
      <h1 class="task-title">Task 1</h1>

      <div class="task-field">
        <strong>Assignees:</strong>
        <span>~~~~~</span>
      </div>

      <div class="task-field">
        <strong>Description:</strong>
        <p>Task의 상세 설명</p>
      </div>

      <div class="task-meta">
        <div><strong>Tags:</strong> <span>@@@@</span></div>
        <div><strong>Status:</strong> <span>@@@@</span></div>
        <div><strong>Priority:</strong> <span>@@@@</span></div>
      </div>
    </div>

    <div class="comment-section">
      <div class="comment-box">
        <p class="comment-text">댓글 1</p>
        <div class="comment-actions">
          <button class="edit-btn">수정</button>
          <button class="delete-btn">삭제</button>
        </div>
      </div>

      <div class="comment-box">
        <p class="comment-text">댓글 2</p>
        <div class="comment-actions">
          <button class="edit-btn">수정</button>
          <button class="delete-btn">삭제</button>
        </div>
      </div>
    </div>
  </main>
  <div class="comment-input-container">
    <input type="text" placeholder="댓글 작성" class="comment-input" />
    <button class="add-comment-btn">댓글 추가</button>
  </div>
</body>
</html>
