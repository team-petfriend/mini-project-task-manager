<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹앱 기본 레이아웃 구성</title>
    <style>
      body {
        margin: 0;
        background-color: #0f172a;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .inner-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 1440px;
        height: 700px;
        border-radius: 16px;

      background: rgba(255, 255, 255, 0.08);    
      backdrop-filter: blur(10px);  
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4); 
      color: #fff;
      }

      .inner-left,
      .inner-right
      {
        flex: 1;
      }

      .inner-left {
        height: 100%;
      }

      .inner-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }


      .inner-right {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        position: relative;
        z-index: 10; 
      }

      .inner-right input {
        width: 96%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }

      .inner-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none; 
      }

      #signupBtn {
        width: 100%;
        padding: 12px 0;
        border: none;
        border-radius: 12px;
        cursor: pointer;

        background: rgba(99, 102, 241, 0.35); 
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.25);

        color: #fff;
        font-size: 16px;
        font-weight: bold;

        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        transition: 0.25s ease;
      }

      #signupBtn:hover {
        background: rgba(129, 134, 255, 0.55);
      }

    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="inner-wrapper">
          <div class="inner-left">
            <img src="./img/login.png" alt="">
          </div>
        <div class="inner-right">
            <div>
              <label >아이디</label>
              <input type="text" id="username">
            </div>
            <div>
              <label>비밀번호</label>
              <input type="password" id="password">
            </div>
            <div>
              <label>비밀번호 확인</label>
              <input type="password" id="passwordCheck">
            </div>
            <div>
              <label>이메일</label>
              <input type="email" id="email">
            </div>
            <div>
              <label>닉네임</label>
              <input type="text" id="nickname">
            </div>
            <div>
              <button id="signupBtn">회원가입</button>
            </div>
        </div>
        </div>
      </div>
      
      <script>
        
        // 1. 회원가입 버튼 요소 가져오기
    const signupBtn = document.getElementById('signupBtn');

    // 2. 버튼에 'click' 이벤트 리스너 추가
    signupBtn.addEventListener('click', async (e) => {
        e.preventDefault(); // 폼 제출의 기본 동작 방지 (필요에 따라)

        // 3. 입력 필드 값 가져오기
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password'); // 첫 번째 비밀번호
        const passwordConfirmInput = document.getElementById('password-confirm'); // 비밀번호 확인 필드 ID 수정 필요
        const emailInput = document.getElementById('email'); // 이메일 필드 ID 수정 필요
        const nicknameInput = document.getElementById('nickname'); // 닉네임 필드 ID 수정 필요

        // **주의**: 현재 HTML에는 비밀번호 확인, 이메일, 닉네임 필드의 ID가 모두 'password'로 되어 있습니다.
        // 정확한 값 수집을 위해 HTML의 ID를 **고유하게** 수정해야 합니다.
        // 예를 들어: id="password-confirm", id="email", id="nickname" 등으로 수정 권장.
        
        // **임시로, 현재 HTML 구조에 맞춰 입력 필드 요소를 가져옵니다.**
        // 실제로는 고유한 ID를 사용해야 합니다.
        const inputs = document.querySelectorAll('.inner-right input');
        
        // 첫 번째 입력 필드 (아이디)
        const username = inputs[0].value;
        // 두 번째 입력 필드 (비밀번호)
        const password = inputs[1].value; 
        // 세 번째 입력 필드 (비밀번호 확인)
        const passwordConfirm = inputs[2].value;
        // 네 번째 입력 필드 (이메일)
        const email = inputs[3].value;
        // 다섯 번째 입력 필드 (닉네임)
        const nickname = inputs[4].value;

        if (password !== passwordConfirm) {
            alert('비밀번호와 비밀번호 확인이 일치하지 않습니다.');
            return;
        }

        if (!username || !password || !email) {
            alert('모든 필수 정보를 입력해 주세요.');
            return;
        }

        const userData = {
            username: username,
            password: password,
            email: email,
            nickname: nickname
        };

    
        const API_ENDPOINT = 'http://localhost:8080/api/register';

        try {
            // 7. Fetch API를 사용하여 POST 요청 보내기
            const response = await fetch(API_ENDPOINT, {
                method: 'POST', // 데이터 생성/전송에는 POST 메서드 사용
                headers: {
                    'Content-Type': 'application/json', // JSON 형식으로 데이터 전송 명시
                },
                // JavaScript 객체를 JSON 문자열로 변환하여 본문에 담아 전송
                body: JSON.stringify(userData), 
            });

            // 8. 응답 처리
            if (response.ok) {
                // HTTP 상태 코드가 200-299 범위인 경우 (성공)
                const result = await response.json(); // 서버 응답(JSON) 파싱
                alert('회원가입에 성공했습니다! 환영합니다, ' + result.nickname);
                // 성공 후 로그인 페이지로 리디렉션 등 추가 작업
                // window.location.href = '/login.html';
            } else {
                // HTTP 상태 코드가 400 이상인 경우 (실패)
                const errorData = await response.json(); // 에러 응답 파싱
                alert('회원가입 실패: ' + (errorData.message || '알 수 없는 오류'));
            }

        } catch (error) {
            // 네트워크 오류, 서버 연결 실패 등
            console.error('회원가입 요청 중 오류 발생:', error);
            alert('서버와 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.');
        }
    });
      </script>
  </main>
  </body>
</html>
