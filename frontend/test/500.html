<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹앱 기본 레이아웃 구성</title>
    <style>
    body {
      margin: 0;
      background-color: #eee;
      font-family: 'Pretendard', sans-serif;
  }
      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      } 

      .inner-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 700px;
        height: 700px;
        border-radius: 16px;
        border-radius: 12px;
        overflow: hidden;
      }

    .img-box {
      margin-top: 50px;
    }

    .img-box p {
      text-align: center;
      font-weight: bold;
      font-size: 30px;
    } 

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    img {
    border-radius: 12px;
    }

    </style>
  </head>
  
  <body>
    <main>
      <div class="container">
        <div class="inner-wrapper">
          <div class="img-box">
            <img src="./img/500.png" alt="">
            <p>404 Not found</p>
          </div>
        </div>
      </div>
  </main>
  </body>
</html>
