<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>웹앱 기본 레이아웃 구성</title>

  <style>
    body {
      margin: 0;
      background-color: #eee;
      font-family: 'Pretendard', sans-serif;
      overflow: hidden;
    }

    /* ================= HEADER ================= */

    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: 64px;

      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 32px;

      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .logo a {
      text-decoration: none;
      color: #111827;
    }

    .logo span {
      color: #4f46e5;
    }

    .nav {
      display: flex;
      gap: 32px;
    }

    .nav a {
      font-size: 14px;
      text-decoration: none;
      color: #6b7280;
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: #111827;
    }

    .header-auth a {
      font-size: 14px;
      text-decoration: none;
      color: #111827;
    }

    .header-auth a:hover {
      color: #4f46e5;
    }

    /* ================= MAIN ================= */

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 64px);
    }

    .inner-wrapper {
      display: flex;
      width: 1440px;
      height: 700px;
      border-radius: 16px;
      overflow: hidden;

      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .inner-left,
    .inner-right {
      flex: 1;
    }

    .inner-left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .inner-right {
      margin-top: 80px;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: #111827;
    }

    .inner-right form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #374151;
    }

    .inner-right input {
      width: 96%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      outline: none;

      background: rgba(255, 255, 255, 0.95);
      font-size: 14px;
      transition: all 0.25s ease;
    }

    .inner-right input:hover {
      border-color: rgba(79, 70, 229, 0.45);
    }

    .inner-right input:focus {
      border-color: rgba(79, 70, 229, 0.85);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.18);
    }

    /* ===== login button ===== */

    #signupBtn {
      width: 100%;
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      cursor: pointer;

      background: rgba(79, 70, 229, 0.85);
      color: #fff;
      font-size: 16px;
      font-weight: bold;

      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
      transition: 0.25s ease;
    }

    #signupBtn:hover {
      background: rgba(67, 56, 202, 0.95);
    }

    /* ===== social login ===== */

    .social-login {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .social-login button {
      width: 100%;
      padding: 12px 0;
      border-radius: 12px;
      border: none;
      cursor: pointer;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      font-size: 15px;
      font-weight: 600;
    }

    .social-login img {
      width: 18px;
      height: 18px;
    }

    .kakao-login {
      background: #FEE500;
      color: #191919;
    }

    .naver-login {
      background: #03C75A;
      color: #fff;
    }

    /* ===== register links ===== */

    .register-box {
      text-align: center;
      font-size: 13px;
    }

    .register-box a {
      text-decoration: none;
      color: #111827;
    }

    .register-box a:hover {
      color: #4f46e5;
    }
  </style>
</head>

<body>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <a href="#"><span>E</span>oullim</a>
    </div>

    <nav class="nav">
      <a href="#">지도</a>
      <a href="#">공간대여</a>
      <a href="#">이벤트</a>
      <a href="#">문의</a>
    </nav>

    <div class="header-auth">
      <a href="../test/login.html">로그인</a>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="inner-wrapper">
      <div class="inner-left">
        <img src="../register/img/login.png" alt="">
      </div>

      <div class="inner-right">
        <form>
          <div class="form-group">
            <label>아이디</label>
            <input type="text" placeholder="아이디를 입력해주세요">
          </div>

          <div class="form-group">
            <label>비밀번호</label>
            <input type="password" placeholder="비밀번호를 입력해주세요">
          </div>

          <button type="button" id="signupBtn">로그인</button>

          <div class="social-login">
            <button type="button" class="kakao-login">
              <img src="./img/카카오톡.png"> 카카오로 로그인
            </button>
            <button type="button" class="naver-login">
              <img src="./img/네이버.png"> 네이버로 로그인
            </button>
          </div>

          <div class="register-box">
            <a href="#">아이디 찾기</a> | <a href="./register.html">회원가입</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

</body>
</html>
