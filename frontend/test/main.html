<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Sample</title>

<style>
body {
  margin: 0;
  background: #f3f4f6;
  font-family: 'Pretendard', sans-serif;
  color: #111827;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 100;

  background-color: white;

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}

.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 16px 32px;

  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: #111827;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
} 

.logo a {
  text-decoration: none;
  color: #111827;
}

.logo>a>span {
  color: #4f46e5;
}

.nav {
  display: flex;
  gap: 32px;
}

.nav a {
  font-size: 14px;
  text-decoration: none;
  color: #6b7280;
  transition: color 0.2s ease;
}

.nav a:hover {
  color: #111827;
}

.register-box>a {
  text-decoration: none;
  color: #111827;
}

.mode-toggle {
  display: flex;
  background: #f3f4f6;
  border-radius: 999px;
  padding: 4px;
  gap: 4px;
}

.mode-toggle {
  margin-left: 20px;
}

.toggle-btn {
  padding: 6px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;

  color: #6b7280;
  transition: all 0.25s ease;
}

.toggle-btn:hover {
  color: #111827;
  background: rgba(99, 102, 241, 0.08); 
}

.toggle-btn.active {
  background: linear-gradient(
  135deg,
  #4338ca,   
  #6366f1   
);
  color: #ffffff;
  box-shadow: 0 6px 16px rgba(79, 70, 229, 0.28);
}

.toggle-btn:hover {
  color: #111827;
}

.toggle-btn.active {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: #fff;
  box-shadow: 0 6px 16px rgba(79, 70, 229, 0.28);
}

.toggle-btn.map.active {
  background: linear-gradient(135deg, #FEE500, #FFD400);
  color: #191919;
  box-shadow: 0 6px 16px rgba(254, 229, 0, 0.45);
}


/* 공통 */
.section {
  max-width: 1440px;
  margin: 0 auto 80px;
  padding: 0 32px;
}

.section-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 24px;
}



/* ======================
   메인 배너
====================== */
.banner-wrap {
  max-width: 1440px;
  margin: 40px auto 80px;
  padding: 0 32px;
}

.banner {
  height: 200px;
  border-radius: 16px;
  overflow: hidden;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  display: flex;
}

.banner-slide {
  min-width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 28px;
  font-weight: 700;
}

/* ======================
   새로운 공간
====================== */
.space-list {
  display: flex;
  gap: 24px;
  overflow-x: auto;
  margin-right: -32px;   /* ← 핵심 */
  padding-right: 32px;
}

.space-card {
  width: 100%;
  min-width: 300px;
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease;
}

.space-card:hover {
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.space-img {
  height: 180px;
  background: linear-gradient(135deg, #f59e0b, #facc15);
}

.space-name {
  padding: 14px;
  font-weight: 600;
}

/* ======================
  진행중인 이벤트
====================== */
.event-list {
  display: flex;
  gap: 24px;
}

.event-card {
  flex: 1;
  height: 220px;
  border-radius: 16px;
  background: linear-gradient(135deg, #ec4899, #f472b6);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 20px;
  font-weight: 700;
}

/* ======================
   후기
====================== */
.review-list {
  display: flex;
  gap: 24px;
}

.review-card {
  flex: 1;
  height: 200px;
  border-radius: 16px;
  background: linear-gradient(135deg, #10b981, #34d399);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #064e3b;
  font-weight: 700;
}
</style>
</head>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <a href=""><span>E</span>oullim</a> 

      <div class="mode-toggle">
        <a href="/map.html" class="toggle-btn active">홈페이지</a>
        <a href="/home.html" class="toggle-btn">지도</a>
      </div>
    </div>

    <nav class="nav">
      <a href="#">지도</a>
      <a href="">공간대여</a>
      <a href="#">이벤트</a>
      <a href="#">문의</a>
    </nav>

    <div class="register-box">
      <a href="../test/login.html">로그인</a>
      <a href="">회원가입</a>
    </div>
  </div>
</header>

<body>
<div class="banner-wrap">
  <div class="banner">
    <div class="banner-slide">메인 배너 1</div>
    <!-- JS 붙이면 슬라이드 가능 -->
  </div>
</div>

<section class="section">
  <div class="section-title">새로운 공간</div>
  <div class="space-list">
    <div class="space-card">
      <div class="space-img"></div>
      <div class="space-name">공간 이름 1</div>
    </div>
    <div class="space-card">
      <div class="space-img"></div>
      <div class="space-name">공간 이름 2</div>
    </div>
    <div class="space-card">
      <div class="space-img"></div>
      <div class="space-name">공간 이름 3</div>
    </div>
    <div class="space-card">
      <div class="space-img"></div>
      <div class="space-name">공간 이름 4</div>
    </div>
  </div>
</section>

<!-- 진행중인 이벤트 -->
<section class="section">
  <div class="section-title">진행중인 이벤트</div>
  <div class="event-list">
    <div class="event-card">EVENT 1</div>
    <div class="event-card">EVENT 2</div>
  </div>
</section>

<!-- 방금 올라온 후기 -->
<section class="section">
  <div class="section-title">방금 올라온 후기</div>
  <div class="review-list">
    <div class="review-card">후기 1</div>
    <div class="review-card">후기 2</div>
    <div class="review-card">후기 3</div>
  </div>
  <div class="review-list" style="margin-top: 20px;">
    <div class="review-card">후기 1</div>
    <div class="review-card">후기 2</div>
    <div class="review-card">후기 3</div>
  </div>
</section>


</body>
</html>
