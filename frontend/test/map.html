<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Sample</title>

<style>
body {
  margin: 0;
  background: white;
  font-family: 'Pretendard', sans-serif;
  color: #111827;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 100;

  background-color: white;

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 32px;

  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  color: #111827;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
} 

.logo a {
  text-decoration: none;
  color: #111827;
}

.logo>a>span {
  color: #FEE500;
}

.nav {
  display: flex;
  gap: 32px;
}

.nav a {
  text-decoration: none;
  color: #6b7280;
  transition: color 0.2s ease;
}

.nav a:hover {
  color: #111827;
}

.register-box>a {
  text-decoration: none;
  font-size: 16px;
  color: #6b7280;
}

.register-box>a:hover {
  color: #111827;
}

.mode-toggle {
  display: flex;
  background: #f3f4f6;
  border-radius: 999px;
  padding: 4px;
  gap: 4px;
}

.mode-toggle {
  margin-left: 20px;
  color: #191919;
  border: 1px solid #FEE500;
}

.toggle-btn {
  padding: 6px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;

  color: #6b7280;
  transition: all 0.25s ease;
}

.toggle-btn:hover {
  color: #111827;
  background: rgba(99, 102, 241, 0.08); 
}

.toggle-btn.active {
  background: linear-gradient(
  135deg,
  #4338ca,   
  #6366f1   
);
  color: #ffffff;
  box-shadow: 0 6px 16px rgba(79, 70, 229, 0.28);
}

.toggle-btn:hover {
  color: #111827;
}

.toggle-btn.active {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: #fff;
  box-shadow: 0 6px 16px rgba(79, 70, 229, 0.28);
}

.toggle-btn.map.active {
  background: linear-gradient(135deg, #FEE500, #FFD400);
  color: #191919;
  box-shadow: 0 6px 16px rgba(254, 229, 0, 0.45);
}

.section {
  max-width: 1280px;
  margin: 0 auto 80px;
  padding: 0 32px;
}

.map-container {
  display: flex;
  flex-direction: column;
  margin: auto;
  padding: 20px;
  margin-top: 10px;
  border: 1px solid #f3f4f6;
}

.map-container span {
  font-weight: bold;
}

#map {
  width: 100%;
  height: 500px;
  margin-top: 10px;
  border-radius: 6px;
}

.second {
  color: #6b7280;
  font-size: 12px;
}

.space-card {
  display: flex;
  flex-wrap: wrap; 
  gap: 16px;      
  margin-top: 20px;
  cursor: pointer; 
}

.card {
  flex: 1 1 calc(25% - 12px); 
  background-color: #f3f4f6;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  box-sizing: border-box; 
  height: 300px;
}

.img-wrapper {
  margin-top: 30px;
  width: 100%;
  height: 150px;
  cursor: pointer;
}

.img-wrapper img {
  width: 100%;
  object-fit: cover;
}

.pagination-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 20px 0;
}

.pagination-container button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  background-color: #e5e7eb; 
  transition: background-color 0.3s;
}

.pagination-container button:hover {
  background-color: #d1d5db;
}

.pagination-container button.active {
  background-color: #4f46e5; 
  color: #fff;
}

.pagination-container button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}


</style>
</head>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <a href=""><span>E</span>oullim</a> 

      <div class="mode-toggle">
        <a href="/test/main.html" class="toggle-btn">홈페이지</a>
        <a href="/test/map.html" class="toggle-btn map active">지도</a>
      </div>
    </div>

    <nav class="nav">
      <a href="#">지도</a>
      <a href="">공간대여</a>
      <a href="#">이벤트</a>
      <a href="#">문의</a>
    </nav>

    <div class="register-box">
      <a href="../test/login.html">로그인</a>
      <a href="">회원가입</a>
    </div>
  </div>
</header>

<body>
  <section class="section">
      <div class="map-container">
          <span>내 주변 무인 대여공간</span>
          <span class="second">내 주변에 가까운 무인공간을 찾아보세요.</span>
          <div id="map"></div>
          <div class="space-card">
            <div class="card">1</div>
              <div class="card">2</div>
              <div class="card">3</div>
              <div class="card">4</div>
              <div class="card">5</div>
              <div class="card">6</div>
              <div class="card">7</div>
              <div class="card">8</div>
              <div class="card">5</div>
              <div class="card">6</div>
              <div class="card">7</div>
              <div class="card">8</div>
          </div>
          <div class="img-wrapper">
            <img src="./img/맵이벤트.png" alt="">
          </div>
          <div class="pagination-container">
            <button class="prev">&lt;</button>
            <div class="pages"></div>
            <button class="next">&gt;</button>
          </div>
      </div>
  </section>
  <section class="section">
  </section>
  <div class="section">
  </div>

  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=cd663d21be538a20913843972ae7bf17"></script>

  <script>
  kakao.maps.load(function() {

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      var lat = position.coords.latitude;  
      var lng = position.coords.longitude; 

      var mapContainer = document.getElementById('map');
      var mapOption = {
        center: new kakao.maps.LatLng(lat, lng), 
        level: 6
      };

      var map = new kakao.maps.Map(mapContainer, mapOption);

      var markerPosition  = new kakao.maps.LatLng(lat, lng); 
      var marker = new kakao.maps.Marker({
        position: markerPosition
      });
      marker.setMap(map);

    }, function(error) {
      console.error("위치 정보를 가져올 수 없습니다.", error);
    });
  } else {
    alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
  }
});
  </script>
</body>
</html>
