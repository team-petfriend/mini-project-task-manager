<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹앱 기본 레이아웃 구성</title>
    <style>
    body {
        margin: 0;
        background-color: #eee;
        font-family: 'Pretendard', sans-serif;
        overflow: hidden;
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 90vh;
      } 


      .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: 64px;

      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 32px;

      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
    }

    .logo a {
      text-decoration: none;
      color: #111827;
    }

    .logo span {
      color: #4f46e5;
    }

    .nav {
      display: flex;
      gap: 32px;
    }

    .nav a {
      font-size: 14px;
      text-decoration: none;
      color: #6b7280;
      transition: color 0.2s ease;
    }

    .nav a:hover {
      color: #111827;
    }

    .header-auth a {
      font-size: 14px;
      text-decoration: none;
      color: #111827;
    }

    .header-auth a:hover {
      color: #4f46e5;
    }


      .inner-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 1440px;
        height: 700px;
        border-radius: 16px;
        overflow: hidden;

        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);

        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }

      .inner-left,
      .inner-right
      {
        flex: 1;
      }

      .inner-left {
        height: 100%;
      }

      .inner-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .inner-right {
        padding: 48px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        color: #111827; 
      }

      .inner-right input {
        width: 96%;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        outline: none;

        background: rgba(255, 255, 255, 0.95);
        color: #111827;
        font-size: 14px;
      }

      .inner-right input::placeholder {
        color: #9ca3af;
      }
      .inner-left img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none; 
      }

      #signupBtn {
        width: 100%;
        padding: 12px 0;
        border: none;
        border-radius: 12px;
        cursor: pointer;

        margin-top: 20px;

        background: rgba(79, 70, 229, 0.85);
        
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.25);

        color: #fff;
        font-size: 16px;
        font-weight: bold;

        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        transition: 0.25s ease;
      }

      #signupBtn:hover {
        background: rgba(67, 56, 202, 0.95);
      }

      .register-box {
        width: 100%;
        text-align: center;
        gap: 50px;
      }

      .register-box a {
        font-size: 13px;
        text-decoration: none;
        color: #111827;
      }

      .register-box span {
        font-size: 14px;
        color: #111827;
      }

      .register-box a:hover {
        color: #c7cad1;
      }

      .label-item {
        margin-top: 20px;
      }

    .inner-right input:hover {
      border-color: rgba(79, 70, 229, 0.45);
      background: rgba(255, 255, 255, 1);
    }

    .inner-right input:focus {
      border-color: rgba(79, 70, 229, 0.85);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.18);
      background: #ffffff;
    }

    </style>
  </head>
  <body>
    <header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <a href="#"><span>E</span>oullim</a>
    </div>

    <nav class="nav">
      <a href="#">지도</a>
      <a href="#">공간대여</a>
      <a href="#">이벤트</a>
      <a href="#">문의</a>
    </nav>

    <div class="header-auth">
      <a href="../test/login.html">로그인</a>
      <a href="../test/login.html">회원가입</a>
    </div>
  </div>
</header>

    <main>
      <div class="container">
        <div class="inner-wrapper">
          <div class="inner-left">
            <img src="../register/img/login.png" alt="">
          </div>
        <div class="inner-right">
          <!-- 추후 form 액션 작성 -->
          <form action="">
            <div class="label-item">
              <label>아이디</label>
              <input type="text" id="loginId" placeholder="아이디 입력(6~20자)">
            </div>
            <div class="label-item">
              <label>비밀번호</label>
              <input type="password" id="password" placeholder="비밀번호 입력(문자, 숫자, 특수문자 포함 8~20자)">
            </div>
            <div class="label-item">
              <label>비밀번호 확인</label>
              <input type="password" id="passwordCheck" placeholder="비밀번호 재입력">
            </div>
            <div class="label-item">
              <label>이름</label>
              <input type="text" id="name" placeholder="이름을 입력해주세요">
            </div>
            <div class="label-item">
              <label>이메일</label>
              <input type="email" id="email" placeholder="이메일 주소를 입력해주세요 '@' 포함">
            </div>
            <div class="label-item">
              <label>휴대폰 번호</label>
              <input type="text" id="phone" placeholder="휴대폰 번호 입력 ('-' 제외 11자리 입력)">
            </div>
            <div>
              <button id="signupBtn">회원가입</button>
            </div>
          </form>
        </div>
        </div>
      </div>
  </main>
  </body>
</html>
